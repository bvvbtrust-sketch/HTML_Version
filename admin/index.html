<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 1. Tell Decap CMS not to look for config.yml automatically
    window.CMS_MANUAL_INIT = true;

    // 2. Define your configuration object
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org", // Your Node.js proxy
        auth_endpoint: "auth",
       
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };

    // 3. Handshake Debugger (Check your console to see if the popup talks to this window)
    window.addEventListener("message", async (event) => {
    // Only listen to the proxy
    if (event.origin === "https://test2.bvvbtrust.org" && event.data.includes("authorization:github:success")) {
      
      const payload = JSON.parse(event.data.replace("authorization:github:success:", ""));
      const token = payload.token;
      
      console.log("✅ Token received! Testing GitHub API access behind the scenes...");
      
      try {
        // Test 1: Can we read the user profile?
        const userRes = await fetch("https://api.github.com/user", {
          headers: { Authorization: `token ${token}` }
        });
        console.log("GitHub User Check:", userRes.status, await userRes.json());
        
        // Test 2: Can we access the specific repository?
        const repoRes = await fetch("https://api.github.com/repos/bvvbtrust-sketch/HTML_VERSION", {
          headers: { Authorization: `token ${token}` }
        });
        const repoData = await repoRes.json();
        console.log("GitHub Repo Check:", repoRes.status, repoData);
        
        // Check for push permissions
        if (repoData.permissions && repoData.permissions.push) {
          console.log("🟩 SUCCESS: You have push access! If Decap isn't loading, check for the site_domain bug.");
        } else {
          console.error("🟥 ERROR: You DO NOT have push access to bvvbtrust-sketch/HTML_VERSION. Decap CMS is silently aborting the login.");
        }
      } catch (err) {
        console.error("API Test Failed:", err);
      }
    }
  }, false);
  </script>
</head>

<body>
  <div id="nc-root"></div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Initialize the CMS using the global config defined above
    if (window.CMS) {
      CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
