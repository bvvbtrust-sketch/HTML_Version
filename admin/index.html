<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 1. Tell Decap we will initialize manually
    window.CMS_MANUAL_INIT = true;

    // 2. Define the exact configuration
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };

    // 3. The "Perfect Profile" Auto-Login Listener
    window.addEventListener("message", async (event) => {
      if (event.origin === "https://test2.bvvbtrust.org" && typeof event.data === "string" && event.data.includes("authorization:github:success")) {
        console.log("1. Intercepted valid token! Fetching GitHub profile...");
        
        try {
          const jsonString = event.data.replace("authorization:github:success:", "");
          const payload = JSON.parse(jsonString);
          const token = payload.token;
          
          const userRes = await fetch("https://api.github.com/user", {
            headers: { Authorization: `token ${token}` }
          });
          const userData = await userRes.json();
          
          console.log("2. Profile fetched:", userData.login);

          const decapUser = {
            token: token,
            backendName: "github",
            name: userData.name || userData.login,
            login: userData.login,
            avatar_url: userData.avatar_url
          };
          
          localStorage.setItem("decap-cms-user", JSON.stringify(decapUser));
          console.log("3. Perfect profile saved! Reloading into dashboard...");
          window.location.reload();
        } catch (err) {
          console.error("Failed to process login:", err);
        }
      }
    }, false);
  </script>
</head>

<body>
  <!-- This div MUST exist for Decap to render the UI -->
  <div id="nc-root"></div>

  <!-- Load Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>

  <!-- Initialize -->
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    } else {
      console.error("CMS library failed to load.");
    }
  </script>
</body>
</html>
