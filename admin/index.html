<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>

  <!-- Step 1: disable auto init -->
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <!-- Step 2: define config BEFORE CMS loads -->
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>

  <!-- Step 3: load CMS -->
  <script src="https://unpkg.com/decap-cms@3.11.0/dist/decap-cms.js"></script>

  <!-- Step 4: init immediately -->
  <script>
    CMS.init({ config: window.CMS_CONFIG });
  </script>
</body>
</html>
