<script>
    // 1. Configuration
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };

    // 2. The "Perfect Profile" Auto-Login Listener
    window.addEventListener("message", async (event) => {
      if (event.origin === "https://test2.bvvbtrust.org" && typeof event.data === "string" && event.data.includes("authorization:github:success")) {
        
        console.log("1. Intercepted valid token! Fetching GitHub profile...");
        
        // Extract the token
        const payload = JSON.parse(event.data.replace("authorization:github:success:", ""));
        const token = payload.token;
        
        try {
          // Ask GitHub for the user's details (Decap requires this to build the UI)
          const userRes = await fetch("https://api.github.com/user", {
            headers: { Authorization: `token ${token}` }
          });
          const userData = await userRes.json();
          
          console.log("2. Profile fetched:", userData.login);

          // Build the EXACT object Decap CMS looks for
          const decapUser = {
            token: token,
            backendName: "github",
            name: userData.name || userData.login,
            login: userData.login,
            avatar_url: userData.avatar_url
          };
          
          // Save it to the vault
          localStorage.setItem("decap-cms-user", JSON.stringify(decapUser));
          
          console.log("3. Perfect profile saved! Reloading into dashboard...");
          
          // Reload the page to boot up Decap CMS logged in
          window.location.reload();

        } catch (err) {
          console.error("Failed to fetch user profile from GitHub:", err);
        }
      }
    }, false);
  </script>
