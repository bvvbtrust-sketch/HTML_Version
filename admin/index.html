<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
</head>
<body>
  <!-- This div is required for Decap to anchor its UI -->
  <div id="nc-root"></div>

  <script>
    // 1. Manually fetch the config from a non-standard name to avoid the 404 auto-lookup
    fetch('./cms-config.json')
      .then(response => response.json())
      .then(configData => {
        // 2. Load the CMS script ONLY after we have the config data
        const script = document.createElement('script');
        script.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
        
        script.onload = () => {
          // 3. Initialize with our manual data
          window.CMS.init({ config: configData });
        };
        document.head.appendChild(script);
      })
      .catch(err => console.error("Config fetch failed:", err));
  </script>
</body>
</html>
