<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 🔥 1. THE POPUP LOGIC (Extract token -> Fetch Profile -> Save -> Close)
    const hash = window.location.hash;
    if (hash.includes("access_token=")) {
      const token = new URLSearchParams(hash.substring(1)).get("access_token");
      
      // Fetch the user's profile from GitHub before saving!
      fetch("https://api.github.com/user", {
        headers: { Authorization: "token " + token }
      })
      .then(res => res.json())
      .then(userData => {
        // Build the EXACT complete profile Decap demands
        const decapUser = {
          token: token,
          backendName: "github",
          name: userData.name || userData.login,
          login: userData.login,
          avatar_url: userData.avatar_url
        };
        
        // Save to vault
        localStorage.setItem("decap-cms-user", JSON.stringify(decapUser));
        localStorage.setItem("netlify-cms-user", JSON.stringify(decapUser));
        
        // Tell the main window we are done, then close!
        localStorage.setItem("cms_login_success", Date.now().toString());
        window.close();
      })
      .catch(err => {
        console.error("Failed to fetch profile", err);
        document.body.innerHTML = "<h1>Failed to fetch GitHub profile. Check console.</h1>";
      });
    }

    // 🔥 2. THE MAIN WINDOW LOGIC (Wait for the popup to finish, then reload)
    if (!window.location.hash.includes("access_token=")) {
      // Listen for the popup updating the vault
      window.addEventListener("storage", (event) => {
        if (event.key === "cms_login_success") {
          console.log("Vault loaded! Booting dashboard...");
          window.location.reload();
        }
      });

      // Backup Watcher: Check the vault every 1 second in case the event listener fails
      let watchVault = setInterval(() => {
        if (localStorage.getItem("cms_login_success")) {
          clearInterval(watchVault);
          localStorage.removeItem("cms_login_success"); // Clean up
          window.location.reload();
        }
      }, 1000);
    }

    // --- STANDARD CONFIG ---
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [{ label: "Trust Name", name: "trustName", widget: "string" }]
            }
          ]
        }
      ]
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  
  <script>
    // Only boot Decap if we are in the main window (not the popup)
    if (window.CMS && !window.location.hash.includes("access_token=")) {
      // Clean up our trigger key before booting
      localStorage.removeItem("cms_login_success"); 
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
