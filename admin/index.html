<script>
  // Inject button directly into body - no MutationObserver, no React conflicts
  (function () {
    var btn = document.createElement('button');
    btn.id = 'cms-toggle-btn';
    btn.textContent = '⬇ Collapse All';
    var isExpanded = true;

    Object.assign(btn.style, {
      position:     'fixed',
      top:          '12px',
      right:        '180px',
      zIndex:       '999999',
      padding:      '4px 10px',
      background:   '#3d2b1f',
      color:        '#fff',
      border:       'none',
      borderRadius: '6px',
      cursor:       'pointer',
      fontFamily:   'sans-serif',
      fontWeight:   'bold',
      fontSize:     '13px',
      boxShadow:    '0 3px 10px rgba(0,0,0,0.4)'
    });

    btn.onclick = function () {
      // Try every known selector Decap CMS 3.x uses for collapse toggles
      var selectors = [
        'button[aria-expanded]',
        '[data-testid="expand-button"]',
        '[data-testid="collapse-button"]',
        'button[class*="ObjectWidgetTopBar"]',
        'button[class*="collapsed"]',
        'button[class*="expand"]',
        'button[class*="collapse"]',
      ];

      var found = [];
      selectors.forEach(function (sel) {
        document.querySelectorAll(sel).forEach(function (el) {
          if (found.indexOf(el) === -1) found.push(el);
        });
      });

      // Log what was found so you can check DevTools console
      console.log('[CMS Toggle] Found ' + found.length + ' toggle buttons');
      found.forEach(function (el) {
        console.log('[CMS Toggle]', el.tagName, el.className, el.getAttribute('aria-expanded'));
      });

      if (found.length === 0) {
        alert('No collapsible sections found yet. Open a content file (English/Telugu) first, then click this button.');
        return;
      }

      found.forEach(function (el) {
        try {
          var expanded = el.getAttribute('aria-expanded');
          // If aria-expanded is available, use it for smart toggling
          if (expanded !== null) {
            if (isExpanded && expanded === 'true') el.click();
            if (!isExpanded && expanded === 'false') el.click();
          } else {
            // No aria-expanded — just click everything
            el.click();
          }
        } catch (e) {}
      });

      isExpanded = !isExpanded;
      btn.textContent = isExpanded ? '⬇ Collapse All' : '⬆ Expand All';
    };

    // Add to body immediately — no waiting
    document.addEventListener('DOMContentLoaded', function () {
      document.body.appendChild(btn);
    });
  })();
</script>
