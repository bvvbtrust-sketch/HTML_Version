<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // --- 1. THE POPUP LOGIC ---
    // If this window is the popup returning from GitHub...
    if (window.location.hash.includes("access_token=")) {
      const token = new URLSearchParams(window.location.hash.substring(1)).get("access_token");
      // Drop the token in the vault for the main window to find
      localStorage.setItem("github_token_handoff", token);
      window.close(); // Close the popup instantly
    }

    // --- 2. THE ORIGIN SPOOFER (The Trojan Horse) ---
    // Decap CMS is extremely strict. It will ONLY accept a login message if the origin EXACTLY matches the base_url.
    // We intercept Decap's listener and fake the origin so it accepts our message.
    const origAddEventListener = window.addEventListener;
    window.addEventListener = function(type, listener, options) {
      if (type === 'message') {
        const origListener = listener;
        listener = function(event) {
          if (typeof event.data === 'string' && event.data.includes('authorization:github:success')) {
            console.log("Intercepted token! Faking origin so Decap accepts it...");
            const fakeEvent = new MessageEvent('message', {
              data: event.data,
              origin: "https://test2.bvvbtrust.org", // MUST match base_url
              source: window
            });
            return origListener.call(this, fakeEvent); // Hand it to Decap natively!
          }
          return origListener.call(this, event);
        };
      }
      origAddEventListener.call(this, type, listener, options);
    };

    // --- 3. THE VAULT WATCHER ---
    if (!window.location.hash.includes("access_token=")) {
      localStorage.removeItem("github_token_handoff"); // Clear old handoffs
      
      const feedTokenToDecap = (token) => {
        console.log("Token retrieved from popup! Feeding it to Decap CMS natively...");
        const payload = `authorization:github:success:{"token":"${token}","provider":"github"}`;
        // Fire the message from the main window to the main window
        window.postMessage(payload, "*"); 
      };

      // Watch for the popup to drop the token
      window.addEventListener("storage", (e) => {
        if (e.key === "github_token_handoff" && e.newValue) {
          feedTokenToDecap(e.newValue);
          localStorage.removeItem("github_token_handoff");
        }
      });
      
      // Backup watcher just in case 'storage' event fails
      setInterval(() => {
        const token = localStorage.getItem("github_token_handoff");
        if (token) {
          feedTokenToDecap(token);
          localStorage.removeItem("github_token_handoff");
        }
      }, 500);
    }

    // --- 4. CMS CONFIG ---
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  
  <script>
    // Boot Decap CMS normally if we are in the main window
    if (window.CMS && !window.location.hash.includes("access_token=")) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
