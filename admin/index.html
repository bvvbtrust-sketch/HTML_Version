<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 1. Tell Decap CMS not to look for config.yml automatically
    window.CMS_MANUAL_INIT = true;

    // 2. Define your configuration object
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org", // Your Node.js proxy
        auth_endpoint: "auth",
        site_domain: "https://test1.bvvbtrust.org" // Explicit protocol helps handshake
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };

    // 3. Handshake Debugger (Check your console to see if the popup talks to this window)
    window.addEventListener("message", (event) => {
      console.log("Handshake received from:", event.origin);
      console.log("Data payload:", event.data);
    }, false);
  </script>
</head>

<body>
  <div id="nc-root"></div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Initialize the CMS using the global config defined above
    if (window.CMS) {
      CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
