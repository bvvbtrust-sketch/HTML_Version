<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "main_content", // 🚩 Brand new name
          label: "Website Editor",
          files: [
            {
              label: "English Content",
              name: "en_file",
              file: "js/en.json",
              fields: [{ label: "Trust Name", name: "trustName", widget: "string" }]
            },
            {
              label: "Telugu Content",
              name: "te_file",
              file: "js/te.json",
              fields: [{ label: "Trust Name", name: "trustName", widget: "string" }]
            }
          ]
        }
      ]
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      // 🚩 THE RESET: Clear old fragments of the 'site_data' or 'pages' collections
      localStorage.removeItem("netlify-cms-user"); 
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
