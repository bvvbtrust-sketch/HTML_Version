<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
backend: {
  name: "github",
  repo: "bvvbtrust-sketch/HTML_VERSION",
  branch: "main",
  base_url: "https://test2.bvvbtrust.org",
  auth_endpoint: "auth",
  use_graphql: false // 🚀 FORCE DISABLE GRAPHQL
},
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "languages",
          label: "Site Languages",
          // 🚀 SWITCH TO FOLDER MODE: Decap will look inside the 'js' folder
          folder: "js", 
          extension: "json",
          format: "json",
          create: false, // Prevent creating new files for now
          slug: "{{slug}}",
          fields: [
            { label: "Trust Name", name: "trustName", widget: "string" },
            { label: "Motto", name: "motto", widget: "string" }
          ]
        }
      ]
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
