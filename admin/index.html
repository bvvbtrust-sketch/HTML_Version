<script>
  window.CMS_MANUAL_INIT = true;
</script>

<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
  fetch('/admin/config.yaml')
    .then(res => res.text())
    .then(text => {
      const config = jsyaml.load(text);
      CMS.init({ config });
    });
</script>
