<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ugadi Calendar 2026 | BVVB Trust</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #fdf6ec; color: #3d2b1f; }

    header {
      background: #3d2b1f;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a {
      color: #f5c97a;
      text-decoration: none;
      font-size: 14px;
    }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 18px; flex: 1; }

    .toolbar {
      background: #fff8ee;
      border-bottom: 1px solid #e0c88a;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar span { font-size: 14px; color: #7a5c3a; }
    .download-btn {
      margin-left: auto;
      background: #3d2b1f;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
    }
    .download-btn:hover { background: #5c3d20; }

    .pdf-container {
      width: 100%;
      height: calc(100vh - 120px);
    }
    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile fallback */
    .mobile-msg {
      display: none;
      padding: 32px 24px;
      text-align: center;
    }
    .mobile-msg p { margin-bottom: 16px; color: #555; }

    @media (max-width: 600px) {
      .pdf-container { display: none; }
      .mobile-msg { display: block; }
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html">← Back to Home</a>
  <h1>స్వస్తిశ్రీ పరాభవ నామ సంవత్సర పంచాంగం 2026–27</h1>
</header>

<div class="toolbar">
  <span>Brahmasri Valiveru Venkatarama Bhotlu Trust &nbsp;|&nbsp; Ugadi Calendar 2026</span>
  <a class="download-btn" href="TELUGU_CALENDAR_2026.pdf" download>⬇ Download PDF</a>
</div>

<div class="pdf-container">
  <iframe src="TELUGU_CALENDAR_2026.pdf#toolbar=1&navpanes=0" title="Ugadi Calendar 2026"></iframe>
</div>

<!-- Shown only on mobile where iframe PDF doesn't work well -->
<div class="mobile-msg">
  <p>For the best experience, open this on a desktop browser.</p>
  <p>On mobile, tap the button below to view or download the calendar:</p>
  <a class="download-btn" href="TELUGU_CALENDAR_2026.pdf" target="_blank">📄 Open Calendar PDF</a>
</div>

</body>
</html>
