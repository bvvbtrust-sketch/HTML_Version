<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 1. Pure Config
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [{ label: "Trust Name", name: "trustName", widget: "string" }]
            }
          ]
        }
      ]
    };

    // --- THE X-RAY SENSORS ---

    // Sensor A: Intercept all API requests Decap makes to GitHub
    const origFetch = window.fetch;
    window.fetch = async (...args) => {
      const res = await origFetch(...args);
      // If Decap hits a 400+ error, log it in bright red
      if (!res.ok) {
        console.error("🚨 DECAP API CRASH! Failed to access:", args[0]);
        console.error("Status Code:", res.status);
        res.clone().text().then(text => console.error("Error Details:", text));
      }
      return res;
    };

    // Sensor B: Intercept Decap's Native Login Listener
    const origAdd = window.addEventListener;
    window.addEventListener = function(type, listener, options) {
      if (type === 'message') {
        const origListener = listener;
        listener = function(e) {
          if (e.data && typeof e.data === 'string' && e.data.includes('authorization:github:success')) {
            console.log("✅ 1. Native Decap Listener intercepted the token!");
            console.log("Expected Origin:", new URL(window.CMS_CONFIG.backend.base_url).origin);
            console.log("Actual Origin:", e.origin);
            
            if (e.origin !== new URL(window.CMS_CONFIG.backend.base_url).origin) {
              console.error("🚨 ORIGIN MISMATCH! Decap is ignoring the popup because the URLs don't match exactly.");
            } else {
              console.log("✅ 2. Origins match. Decap is natively processing the login...");
            }
          }
          origListener(e);
        }
      }
      origAdd.call(this, type, listener, options);
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
